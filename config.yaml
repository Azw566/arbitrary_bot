        - { dex: UniV2, version: V2, address: "0xBb2b8038a1640196FbE3e38816F3e67Cba72D940" }
        - { dex: Sushi, version: V2, address: "0xCEfF51756c56CeFFCA006cD410B03FFC46dd3a58" }

