        - { dex: UniV2, version: V2, address: "0xB4e16d0168e52d35CaCD2c6185b44281Ec28C9Dc" }
        - { dex: Sushi, version: V2, address: "0x397FF1542f962076d0BFE58eA045FfA2d347ACa0" }

    - pair: "WETH/USDT"
      pools:
        - { dex: UniV3, version: V3, address: "0x4e68Ccd3E89f51C3074ca5072bbAC773960dFa36" }  # 0.05%
        - { dex: UniV2, version: V2, address: "0x0d4a11d5EEaaC28EC3F61d100daF4d40471f1852" }
