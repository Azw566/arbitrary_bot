# ============================================================
# Arbitrage Bot — Main Configuration
# ============================================================

# ============================================================
# Pair Discovery
# ============================================================
pairs:
  mode: "hardcoded"           # "hardcoded" = use pools below | "auto" = subgraph discovery | "manual" = whitelist
  max_pairs: 50               # Cap when using auto mode
  min_liquidity_usd: 100000   # Filter for auto mode

  # ── Active bundle ────────────────────────────────────────────────────────────
  # Switch between named bundles without touching the pool list.
  # Options: major | defi_bluechip | mid_cap | lst | niche | balanced | all
  #
  #   major        — WETH/USDC, WBTC/WETH only. Most competitive, good baseline.
  #   defi_bluechip— UNI, LINK, AAVE, MKR, CRV, LDO, SNX, COMP, SUSHI, BAL.
  #                  Well-known but less watched than major pairs.
  #   mid_cap      — YFI, CVX, ENS, 1INCH, PENDLE, FXS, GRT, DYDX, IMX.
  #                  Wider spreads, slower MEV bots.
  #   lst          — wstETH, rETH, cbETH. Liquid staking tokens. Excellent for
  #                  triangular arb (all peg to ETH ~1:1 but drift constantly).
  #   niche        — APE, BLUR, LOOKS, RPL, FRAX/USDC, LUSD, crvUSD. Lowest
  #                  competition. Spreads can be large during volatility.
  #   balanced     — defi_bluechip + mid_cap. Best risk/reward starting point.
  #   all          — Every pair in the list.
  active_bundle: "balanced"

  # Used only when mode: manual
  whitelist:
    # - "WETH/USDC"

  # Always excluded regardless of mode or bundle
  blacklist:
    # - "SHIB/WETH"

  # ── Bundle definitions ───────────────────────────────────────────────────────
