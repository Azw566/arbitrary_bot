# ============================================================
# Arbitrage Bot — Main Configuration
# ============================================================

# ============================================================
# Pair Discovery
# ============================================================
pairs:
  mode: "hardcoded"           # "hardcoded" = use pools below | "auto" = subgraph discovery | "manual" = whitelist
  max_pairs: 50               # Cap when using auto mode
  min_liquidity_usd: 100000   # Filter for auto mode

  # Used only when mode: manual
  whitelist:
    # - "WETH/USDC"

  # Always excluded regardless of mode
  blacklist:
    # - "SHIB/WETH"

  # Used when mode: hardcoded — known high-volume mainnet pools
  # Each pair needs at least 2 pools on different DEXes to be monitored
  hardcoded_pools:

    - pair: "WETH/USDC"
      pools:
        - { dex: UniV3, version: V3, address: "0x88e6A0c2dDD26FEEb64F039a2c41296FcB3f5640" }  # 0.05%
